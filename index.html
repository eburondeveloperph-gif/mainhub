<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrbitMax // Mobile Genius</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #000000;
            --surface: #12141a;
            --surface-glass: rgba(18, 20, 26, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #9499a6;
            --lime: #ccff00;
            --blue: #007AFF;
            --red: #FF3B30;
            --purple: #8b5cf6;
            --green: #34C759;
            --orange: #FF9500;
            --spring: cubic-bezier(0.19, 1, 0.22, 1);
            --fast: cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --surface-glass: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.08);
            --text-main: #111111;
            --text-dim: #636366;
            --lime: #34d399;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background 0.5s var(--fast);
        }

        .mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            filter: blur(80px);
            opacity: 0.6;
            pointer-events: none;
        }
        .mesh-orb {
            position: absolute;
            width: 150%; height: 150%;
            background: radial-gradient(circle at center, rgba(204, 255, 0, 0.08) 0%, transparent 60%);
            animation: drift 20s infinite alternate ease-in-out;
        }
        [data-theme="light"] .mesh-orb { background: radial-gradient(circle at center, rgba(0, 122, 255, 0.08) 0%, transparent 60%); }

        @keyframes drift {
            from { transform: translate(-20%, -20%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(15deg); }
        }

        .app-shell { height: 100vh; display: flex; flex-direction: column; position: relative; }

        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 24px;
            background: transparent;
            backdrop-filter: blur(0px);
            transition: all 0.3s var(--fast);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header.scrolled {
            background: var(--surface-glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .brand { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; display: flex; align-items: center; gap: 8px; }
        .brand i { color: var(--lime); }

        .btn-ghost {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 42px; height: 42px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .view-container {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 0 20px 160px;
            -webkit-overflow-scrolling: touch;
        }

        .view { display: none; animation: viewIn 0.5s var(--spring); }
        .view.active { display: block; }

        @keyframes viewIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .hero { text-align: center; margin: 20px 0 35px; }
        .hero h1 { font-size: 2.4rem; font-weight: 800; letter-spacing: -2px; }
        .hero p { color: var(--text-dim); font-size: 0.95rem; font-weight: 500; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        @media (min-width: 600px) { .grid { grid-template-columns: repeat(6, 1fr); max-width: 800px; } }

        .card { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; color: inherit; }
        
        .icon-sq {
            width: 65px;
            height: 65px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: all 0.4s var(--spring);
            position: relative;
        }

        .card:active .icon-sq { transform: scale(0.9); }
        
        .card span { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.5px; }

        .card.active-state .icon-sq { border-width: 1.5px; border-color: var(--accent-color); }
        
        .c-blue { --accent-color: var(--blue); }
        .c-lime { --accent-color: var(--lime); }
        .c-orange { --accent-color: var(--orange); }
        .c-purple { --accent-color: var(--purple); }
        .c-red { --accent-color: var(--red); }
        .c-green { --accent-color: var(--green); }

        .icon-sq i { color: var(--accent-color); stroke-width: 2.5px; }

        .dock-wrap {
            position: fixed;
            bottom: 30px;
            left: 0; right: 0;
            display: flex; justify-content: center;
            padding: 0 20px;
            z-index: 2000;
        }

        .dock {
            background: var(--surface-glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 36px;
            padding: 8px 12px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .dock-btn {
            width: 50px; height: 50px;
            border-radius: 20px;
            border: none; background: transparent;
            color: var(--text-dim);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s var(--spring);
            cursor: pointer;
        }
        .dock-btn.active { color: var(--blue); background: rgba(0, 122, 255, 0.1); }
        .dock-btn.main { background: var(--lime); color: #000; width: 64px; height: 64px; border-radius: 26px; box-shadow: 0 10px 25px rgba(204, 255, 0, 0.4); }
        .dock-btn.main:active { transform: scale(0.85); }

        /* App Frame Overlay */
        .app-frame-container { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            display: none; 
            flex-direction: column; 
            z-index: 3000; 
            animation: frameIn 0.4s var(--spring);
        }
        .app-frame-container.active { display: flex; }
        @keyframes frameIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .app-frame-header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 16px 20px; 
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); 
        }
        .app-frame-header h3 { font-size: 1rem; font-weight: 700; color: var(--lime); }
        .app-frame-close { 
            width: 36px; height: 36px; 
            border-radius: 50%; 
            border: none; 
            background: rgba(255,255,255,0.05); 
            color: var(--text-main); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .app-frame { flex: 1; border: none; width: 100%; background: #000; }
    </style>
</head>
<body data-theme="dark">

    <div class="mesh"><div class="mesh-orb"></div></div>

    <div class="app-shell">
        <header class="header" id="header">
            <div class="brand"><i data-lucide="orbit"></i> ORBITMAX</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-ghost" onclick="toggleTheme()"><i data-lucide="sun" id="tIcon"></i></button>
                <button class="btn-ghost"><i data-lucide="bell"></i></button>
            </div>
        </header>

        <div class="view-container" id="scrollArea">
            <section id="view-dash" class="view active">
                <div class="hero">
                    <h1>Genius Core</h1>
                    <p>Workspace & System Nodes</p>
                </div>

                <div class="grid">
                    <!-- AI Tools -->
                    <a href="https://orbit-voice-app.vercel.app" class="card c-purple" onclick="openApp(event, 'Voice AI')">
                        <div class="icon-sq"><i data-lucide="mic-2"></i></div><span>Voice</span>
                    </a>
                    <a href="https://orbit-translator-app.vercel.app" class="card c-blue" onclick="openApp(event, 'Translate')">
                        <div class="icon-sq"><i data-lucide="languages"></i></div><span>Global</span>
                    </a>
                    <a href="https://stt-app-theta.vercel.app" class="card c-lime" onclick="openApp(event, 'STT')">
                        <div class="icon-sq"><i data-lucide="audio-lines"></i></div><span>STT</span>
                    </a>
                    <a href="https://tts-app-liard-seven.vercel.app" class="card c-purple" onclick="openApp(event, 'TTS')">
                        <div class="icon-sq"><i data-lucide="volume-2"></i></div><span>TTS</span>
                    </a>
                    
                    <!-- Google Workspace -->
                    <a href="https://mail.google.com/mail/u/0/" target="_blank" class="card c-red">
                        <div class="icon-sq"><i data-lucide="mail"></i></div><span>Gmail</span>
                    </a>
                    <a href="https://calendar.google.com/calendar/r" target="_blank" class="card c-blue">
                        <div class="icon-sq"><i data-lucide="calendar"></i></div><span>Plan</span>
                    </a>
                    <a href="https://drive.google.com/drive/u/0/" target="_blank" class="card c-green">
                        <div class="icon-sq"><i data-lucide="hard-drive"></i></div><span>Drive</span>
                    </a>
                    <a href="https://keep.google.com/" target="_blank" class="card c-orange">
                        <div class="icon-sq"><i data-lucide="lightbulb"></i></div><span>Keep</span>
                    </a>

                    <a href="https://docs.google.com/document/u/0/" target="_blank" class="card c-blue">
                        <div class="icon-sq"><i data-lucide="file-text"></i></div><span>Docs</span>
                    </a>
                    <a href="https://docs.google.com/spreadsheets/u/0/" target="_blank" class="card c-green">
                        <div class="icon-sq"><i data-lucide="table-2"></i></div><span>Sheets</span>
                    </a>
                    <a href="https://docs.google.com/presentation/u/0/" target="_blank" class="card c-orange">
                        <div class="icon-sq"><i data-lucide="presentation"></i></div><span>Slides</span>
                    </a>
                    <a href="https://slack.com/" target="_blank" class="card c-purple">
                        <div class="icon-sq"><i data-lucide="message-circle"></i></div><span>Slack</span>
                    </a>

                    <!-- AI Models -->
                    <a href="https://chat.openai.com/" target="_blank" class="card c-green">
                        <div class="icon-sq"><i data-lucide="bot"></i></div><span>OpenAI</span>
                    </a>
                    <a href="https://claude.ai/" target="_blank" class="card c-orange">
                        <div class="icon-sq"><i data-lucide="sparkles"></i></div><span>Claude</span>
                    </a>
                    
                    <!-- System -->
                    <a href="http://168.231.78.113:3000" target="_blank" class="card c-blue">
                        <div class="icon-sq"><i data-lucide="server"></i></div><span>VPS</span>
                    </a>
                    <a href="http://168.231.78.113:11434" target="_blank" class="card c-green">
                        <div class="icon-sq"><i data-lucide="terminal"></i></div><span>Ollama</span>
                    </a>
                </div>
            </section>

            <section id="view-chat" class="view">
                <iframe src="https://orbit-voice-app.vercel.app" style="width:100%; height:100%; border:none; border-radius:20px; background:var(--surface);"></iframe>
            </section>
        </div>

        <div class="dock-wrap">
            <nav class="dock">
                <button id="d-dash" class="dock-btn active" onclick="nav('dash')"><i data-lucide="layout-grid"></i></button>
                <button class="dock-btn"><i data-lucide="workflow"></i></button>
                <button class="dock-btn main" onclick="nav('chat')"><i data-lucide="mic"></i></button>
                <button class="dock-btn"><i data-lucide="search"></i></button>
                <button class="dock-btn"><i data-lucide="settings-2"></i></button>
            </nav>
        </div>
    </div>

    <!-- App Frame -->
    <div id="appFrame" class="app-frame-container">
        <div class="app-frame-header">
            <h3 id="appTitle">App</h3>
            <button class="app-frame-close" onclick="closeApp()"><i data-lucide="x"></i></button>
        </div>
        <iframe id="appIframe" class="app-frame"></iframe>
    </div>

    <script>
        lucide.createIcons();

        const scrollArea = document.getElementById('scrollArea');
        const header = document.getElementById('header');
        
        scrollArea.addEventListener('scroll', () => {
            if (scrollArea.scrollTop > 40) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });

        function nav(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.dock-btn')[v === 'dash' ? 0 : v === 'chat' ? 2 : 3].classList.add('active');
            scrollArea.scrollTop = 0;
        }

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('tIcon');
            const isDark = body.getAttribute('data-theme') !== 'light';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            icon.setAttribute('data-lucide', isDark ? 'moon' : 'sun');
            lucide.createIcons();
        }

        function openApp(e, title) {
            e.preventDefault();
            const url = e.currentTarget.href;
            const frame = document.getElementById('appFrame');
            const iframe = document.getElementById('appIframe');
            const titleEl = document.getElementById('appTitle');
            titleEl.textContent = title;
            iframe.src = url;
            frame.classList.add('active');
        }

        function closeApp() {
            const frame = document.getElementById('appFrame');
            const iframe = document.getElementById('appIframe');
            iframe.src = '';
            frame.classList.remove('active');
        }

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                if(window.navigator.vibrate) window.navigator.vibrate(10);
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrbitMax // Ultra OS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #050608;
            --surface: #12141a;
            --surface-hover: #1c1f26;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #9499a6;
            
            /* High-End Accents */
            --blue: #007AFF;
            --purple: #8b5cf6;
            --green: #34C759;
            --red: #FF3B30;
            --orange: #FF9500;
            
            /* Animation Physics */
            --spring: cubic-bezier(0.19, 1, 0.22, 1);
            --fast: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
        }

        /* --- AMBIENT DEPTH MESH --- */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 122, 255, 0.05) 0% , transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        .app-shell { display: flex; height: 100%; position: relative; }

        /* --- SIDEBAR (DESKTOP) --- */
        .sidebar { 
            width: 280px; 
            background: rgba(5, 6, 8, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); 
            display: none; 
            flex-direction: column; 
            padding: 40px 24px; 
            z-index: 100; 
        }
        .sidebar-brand { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff 0%, #8b5cf6 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 50px; 
        }

        .nav-item { 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            padding: 14px 18px; 
            text-decoration: none; 
            color: var(--text-dim); 
            border-radius: 16px; 
            margin-bottom: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s var(--spring); 
        }
        .nav-item:hover, .nav-item.active { 
            background: var(--surface); 
            color: var(--text-main); 
            transform: translateX(5px);
        }

        /* --- VIEWPORT ENGINE --- */
        .viewport { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        .view { 
            display: none; 
            flex-direction: column; 
            height: 100%; 
            width: 100%; 
            padding: 20px 24px 140px; 
            overflow-y: auto; 
            scrollbar-width: none;
            animation: viewFade 0.5s var(--spring);
        }
        .view.active { display: flex; }
        @keyframes viewFade { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* --- STICKY HEADER --- */
        .header { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            padding: 24px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: transparent;
            transition: 0.3s;
        }
        .header h2 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }

        .hero-section { text-align: center; margin: 20px 0 40px; }
        .hero-section h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 4px; background: linear-gradient(to bottom, #fff 40%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-section p { font-size: 1rem; color: var(--text-dim); font-weight: 500; }

        /* --- SPATIAL GRID --- */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 16px; max-width: 500px; margin: 0 auto; }

        .card { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
            perspective: 1000px; 
            text-decoration: none;
        }
        
        .icon-sq { 
            width: 72px; 
            height: 72px; 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 22px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            position: relative; 
            transition: all 0.4s var(--spring);
        }
        
        .card:hover .icon-sq { 
            transform: translateY(-8px) rotateX(10deg) rotateY(-5deg); 
            border-color: var(--glow-color);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5), 0 0 20px -5px var(--glow-color);
        }
        .card:active .icon-sq { transform: scale(0.9) translateY(0); }
        
        .card span { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); transition: 0.3s; }
        .card:hover span { color: var(--text-main); }

        /* Color Glows */
        .c-purple { --glow-color: var(--purple); } .c-blue { --glow-color: var(--blue); } .c-green { --glow-color: var(--green); }
        .c-red { --glow-color: var(--red); } .c-yellow { --glow-color: var(--orange); } .c-pink { --glow-color: #f472b6; }
        .c-teal { --glow-color: #2dd4bf; } .c-orange { --glow-color: #fb923c; }

        .icon-sq i { color: var(--glow-color); transition: 0.3s; }

        /* --- THE GENIUS DOCK (Exactly 5 Icons) --- */
        .dock-container { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; padding: 0 20px; z-index: 1000; }
        .dock { 
            background: rgba(18, 20, 26, 0.7); 
            backdrop-filter: blur(35px) saturate(210%); 
            -webkit-backdrop-filter: blur(35px) saturate(210%); 
            border: 1px solid var(--border); 
            border-radius: 36px; 
            padding: 8px 12px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.8); 
        }
        .dock-btn { 
            width: 54px; 
            height: 54px; 
            border-radius: 24px; 
            border: none; 
            background: transparent; 
            color: var(--text-dim); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s var(--spring); 
        }
        .dock-btn:hover { color: var(--text-main); transform: translateY(-5px); background: rgba(255,255,255,0.05); }
        .dock-btn.active { color: var(--blue); background: rgba(0, 122, 255, 0.1); }
        
        .dock-btn.main-action { 
            background: linear-gradient(135deg, var(--blue), var(--purple)); 
            color: white; 
            width: 64px; 
            height: 64px; 
            border-radius: 28px; 
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.4); 
            margin: 0 6px;
        }
        .dock-btn.main-action:hover { transform: translateY(-10px) scale(1.1); box-shadow: 0 15px 40px rgba(0, 122, 255, 0.6); }

        /* --- APP FRAME OVERLAY --- */
        .app-frame-container { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            display: none; 
            flex-direction: column; 
            z-index: 2000; 
            animation: frameIn 0.5s var(--spring);
        }
        .app-frame-container.active { display: flex; }
        @keyframes frameIn { from { opacity: 0; transform: scale(0.9) translateY(100%); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .app-frame-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: rgba(10,10,10,0.5); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .app-frame-header h3 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.3px; }
        .app-frame-close { width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.05); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .app-frame { flex: 1; border: none; width: 100%; background: #000; }

        @media (min-width: 1024px) {
            .sidebar { display: flex; }
            .grid { grid-template-columns: repeat(6, 1fr); max-width: 900px; }
            .hero-section { text-align: left; max-width: 900px; margin: 40px auto; }
            .header { max-width: 900px; margin: 0 auto 20px; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand"><i data-lucide="orbit"></i> OrbitMax</div>
            <nav>
                <div class="nav-item active" onclick="navTo('dash')"><i data-lucide="layout-grid"></i> Dashboard</div>
                <div class="nav-item" onclick="navTo('chat')"><i data-lucide="message-square-text"></i> Assistant</div>
                <div class="nav-item"><i data-lucide="workflow"></i> Workflows</div>
                <div class="nav-item"><i data-lucide="settings-2"></i> Settings</div>
            </nav>
        </aside>

        <main class="viewport">
            <!-- VIEW: DASHBOARD -->
            <section id="view-dash" class="view active">
                <header class="header">
                    <h2>Terminal Alpha</h2>
                    <div style="display: flex; gap: 12px;">
                        <button class="dock-btn" style="width:40px; height:40px;"><i data-lucide="bell" style="width:18px;"></i></button>
                    </div>
                </header>

                <div class="hero-section">
                    <h1>OrbitMax</h1>
                    <p>Google Workspace & Autonomous AI Hub</p>
                </div>

                <div class="grid">
                    <div class="card c-purple" onclick="openApp('https://orbit-voice-app.vercel.app', 'Voice AI')"><div class="icon-sq"><i data-lucide="mic-2"></i></div><span>Voice</span></div>
                    <div class="card c-blue" onclick="openApp('https://orbit-translator-app.vercel.app', 'Translate')"><div class="icon-sq"><i data-lucide="languages"></i></div><span>Global</span></div>
                    <div class="card c-teal" onclick="openApp('https://stt-app-theta.vercel.app', 'STT Engine')"><div class="icon-sq"><i data-lucide="audio-lines"></i></div><span>STT</span></div>
                    <div class="card c-pink" onclick="openApp('https://tts-app-liard-seven.vercel.app', 'TTS Engine')"><div class="icon-sq"><i data-lucide="volume-2"></i></div><span>TTS</span></div>
                    
                    <div class="card c-red" onclick="openApp('https://mail.google.com/mail/u/0/', 'Gmail')"><div class="icon-sq"><i data-lucide="mail"></i></div><span>Gmail</span></div>
                    <div class="card c-blue" onclick="openApp('https://calendar.google.com/calendar/r', 'Calendar')"><div class="icon-sq"><i data-lucide="calendar"></i></div><span>Events</span></div>
                    <div class="card c-green" onclick="openApp('https://drive.google.com/drive/u/0/', 'Google Drive')"><div class="icon-sq"><i data-lucide="hard-drive"></i></div><span>Cloud</span></div>
                    <div class="card c-yellow" onclick="openApp('https://keep.google.com/', 'Google Keep')"><div class="icon-sq"><i data-lucide="lightbulb"></i></div><span>Notes</span></div>

                    <div class="card c-blue" onclick="openApp('https://docs.google.com/document/u/0/', 'Google Docs')"><div class="icon-sq"><i data-lucide="file-text"></i></div><span>Docs</span></div>
                    <div class="card c-green" onclick="openApp('https://docs.google.com/spreadsheets/u/0/', 'Sheets')"><div class="icon-sq"><i data-lucide="table-2"></i></div><span>Sheets</span></div>
                    <div class="card c-orange" onclick="openApp('https://slack.com/', 'Slack')"><div class="icon-sq"><i data-lucide="message-circle"></i></div><span>Slack</span></div>
                    <div class="card c-purple" onclick="openApp('https://chat.openai.com/', 'ChatGPT')"><div class="icon-sq"><i data-lucide="bot"></i></div><span>OpenAI</span></div>

                    <div class="card c-teal" onclick="openApp('http://168.231.78.113:3000', 'VPS Terminal')"><div class="icon-sq"><i data-lucide="server"></i></div><span>VPS</span></div>
                    <div class="card c-green" onclick="openApp('http://168.231.78.113:11434', 'Ollama Node')"><div class="icon-sq"><i data-lucide="terminal"></i></div><span>Ollama</span></div>
                </div>
            </section>

            <!-- VIEW: ASSISTANT -->
            <section id="view-chat" class="view">
                <header class="header">
                    <h1>AI Assistant</h1>
                </header>
                <div style="flex:1; max-width:600px; margin:0 auto; width:100%; position:relative;">
                    <iframe src="https://orbit-voice-app.vercel.app" style="position:absolute; inset:0; border:none; border-radius:24px; background:var(--surface);"></iframe>
                </div>
            </section>

            <!-- THE 5-ICON DEFINITIVE DOCK -->
            <div class="dock-container">
                <nav class="dock">
                    <!-- 1. Dashboard -->
                    <button id="dock-dash" class="dock-btn active" onclick="navTo('dash')" title="Dashboard"><i data-lucide="layout-grid"></i></button>
                    <!-- 2. Flows -->
                    <button class="dock-btn" title="Workflows"><i data-lucide="workflow"></i></button>
                    <!-- 3. MAIN COMMAND (VOICE/INPUT) -->
                    <button class="dock-btn main-action" onclick="navTo('chat')" title="Orbit Command"><i data-lucide="mic"></i></button>
                    <!-- 4. Assistant Chat -->
                    <button id="dock-chat" class="dock-btn" onclick="navTo('chat')" title="Assistant"><i data-lucide="message-square-text"></i></button>
                    <!-- 5. Settings -->
                    <button class="dock-btn" title="Settings"><i data-lucide="settings-2"></i></button>
                </nav>
            </div>
        </main>
    </div>

    <!-- APP OVERLAY -->
    <div id="appFrame" class="app-frame-container">
        <div class="app-frame-header">
            <h3 id="appTitle">Node Terminal</h3>
            <button class="app-frame-close" onclick="closeApp()"><i data-lucide="x"></i></button>
        </div>
        <iframe id="appIframe" class="app-frame"></iframe>
    </div>

    <script>
        lucide.createIcons();

        function navTo(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            
            document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
            if(view === 'dash') document.getElementById('dock-dash').classList.add('active');
            if(view === 'chat') document.getElementById('dock-chat').classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(view === 'dash') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if(view === 'chat') document.querySelectorAll('.nav-item')[1].classList.add('active');
        }

        function openApp(url, title) {
            const frame = document.getElementById('appFrame');
            const iframe = document.getElementById('appIframe');
            const titleEl = document.getElementById('appTitle');
            titleEl.textContent = title || "Orbit Node";
            iframe.src = url;
            frame.classList.add('active');
        }

        function closeApp() {
            const frame = document.getElementById('appFrame');
            const iframe = document.getElementById('appIframe');
            iframe.src = '';
            frame.classList.remove('active');
        }

        // Turbo Genius Micro-Tilt Effect
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                const dx = x - xc;
                const dy = y - yc;
                card.querySelector('.icon-sq').style.transform = 
                    `translateY(-8px) rotateX(${-dy/4}deg) rotateY(${dx/4}deg) scale(1.05)`;
            });
            card.addEventListener('mouseleave', () => {
                card.querySelector('.icon-sq').style.transform = '';
            });
        });
    </script>
</body>
</html>

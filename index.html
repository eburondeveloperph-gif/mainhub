<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrbitMax</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #0a0a0f;
            --bg-sidebar: #050508;
            --bg-card: #12121a;
            --bg-dock: rgba(18, 18, 26, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #71717a;
            --border: rgba(255,255,255,0.08);
            --accent-purple: #8b5cf6;
            --accent-indigo: #6366f1;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --shadow: 0 10px 40px rgba(0,0,0,0.5);
            --gradient: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; }

        body { background: var(--bg-main); color: var(--text-primary); overflow: hidden; height: 100vh; width: 100vw; }

        .app-shell { display: flex; height: 100%; }

        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: none; flex-direction: column; padding: 40px 24px; z-index: 100; }
        .sidebar-brand { font-size: 1.4rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 18px; text-decoration: none; color: var(--text-secondary); border-radius: 14px; margin-bottom: 6px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--bg-card); color: var(--text-primary); box-shadow: var(--shadow); }

        .viewport { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .view { display: none; flex-direction: column; height: 100%; width: 100%; padding: 15px; overflow-y: auto; }
        .view.active { display: flex; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { font-size: 1.2rem; font-weight: 500; opacity: 0.9; }

        .hero-section { text-align: center; margin-bottom: 25px; }
        .hero-section h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-section p { font-size: 0.9rem; color: var(--text-secondary); }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 500px; margin: 0 auto; padding-bottom: 140px; }

        .card { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.1s; }
        .card:active { transform: scale(0.94); }
        
        .icon-sq { width: 62px; height: 62px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); position: relative; }
        .icon-sq::after { content: ''; position: absolute; inset: -1px; border-radius: 18px; padding: 1px; background: var(--gradient); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.3s; }
        .card:hover .icon-sq::after { opacity: 1; }
        
        .card span { font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); text-align: center; }

        .card.c-purple .icon-sq i { color: #a78bfa; }
        .card.c-blue .icon-sq i { color: #60a5fa; }
        .card.c-green .icon-sq i { color: #4ade80; }
        .card.c-red .icon-sq i { color: #f87171; }
        .card.c-yellow .icon-sq i { color: #fbbf24; }
        .card.c-pink .icon-sq i { color: #f472b6; }
        .card.c-teal .icon-sq i { color: #2dd4bf; }
        .card.c-orange .icon-sq i { color: #fb923c; }

        .dock-container { position: fixed; bottom: 25px; left: 0; right: 0; display: flex; justify-content: center; padding: 0 15px; z-index: 1000; }
        .dock { background: var(--bg-dock); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 28px; padding: 8px 12px; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow); }
        .dock-btn { width: 46px; height: 46px; border-radius: 18px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .dock-btn:hover { color: var(--text-primary); }
        .dock-btn.active { color: var(--accent-purple); background: rgba(139, 92, 246, 0.15); }
        .dock-btn.mic { background: var(--gradient); color: white; }
        .dock-btn.play { background: var(--accent-green); color: white; width: 65px; border-radius: 20px; }
        .dock-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

        .app-frame-container { position: fixed; inset: 0; background: var(--bg-main); display: none; flex-direction: column; z-index: 2000; }
        .app-frame-container.active { display: flex; }
        .app-frame-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); }
        .app-frame-header h3 { font-size: 1rem; font-weight: 600; }
        .app-frame-close { width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .app-frame { flex: 1; border: none; width: 100%; background: var(--bg-main); }

        @media (min-width: 1024px) {
            .sidebar { display: flex; }
            .grid { grid-template-columns: repeat(6, 1fr); max-width: 1000px; }
            .hero-section { text-align: left; max-width: 1000px; margin: 20px auto; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand"><i data-lucide="orbit"></i> OrbitMax</div>
            <nav>
                <div class="nav-item active" onclick="navTo('dash')"><i data-lucide="layout-grid"></i> Dashboard</div>
                <div class="nav-item" onclick="navTo('chat')"><i data-lucide="message-square"></i> Assistant</div>
                <div class="nav-item"><i data-lucide="settings"></i> Settings</div>
            </nav>
        </aside>

        <main class="viewport">
            <section id="view-dash" class="view active">
                <header class="header">
                    <h2>Eburon Automation</h2>
                    <div style="display: flex; gap: 10px;">
                        <button class="dock-btn"><i data-lucide="bell"></i></button>
                    </div>
                </header>

                <div class="hero-section">
                    <h1>OrbitMax</h1>
                    <p>Google Workspace & AI Services</p>
                </div>

                <div class="grid">
                    <div class="card c-purple" onclick="openApp('https://orbit-voice-app.vercel.app')"><div class="icon-sq"><i data-lucide="mic-2"></i></div><span>Voice</span></div>
                    <div class="card c-blue" onclick="openApp('https://orbit-translator-app.vercel.app')"><div class="icon-sq"><i data-lucide="languages"></i></div><span>Translate</span></div>
                    <div class="card c-teal" onclick="openApp('https://stt-app-theta.vercel.app')"><div class="icon-sq"><i data-lucide="audio-lines"></i></div><span>STT</span></div>
                    <div class="card c-pink" onclick="openApp('https://tts-app-liard-seven.vercel.app')"><div class="icon-sq"><i data-lucide="volume-2"></i></div><span>TTS</span></div>
                    
                    <div class="card c-red" onclick="openApp('https://mail.google.com/mail/u/0/')"><div class="icon-sq"><i data-lucide="mail"></i></div><span>Gmail</span></div>
                    <div class="card c-blue" onclick="openApp('https://calendar.google.com/calendar/r')"><div class="icon-sq"><i data-lucide="calendar"></i></div><span>Calendar</span></div>
                    <div class="card c-green" onclick="openApp('https://drive.google.com/drive/u/0/')"><div class="icon-sq"><i data-lucide="hard-drive"></i></div><span>Drive</span></div>
                    <div class="card c-yellow" onclick="openApp('https://keep.google.com/')"><div class="icon-sq"><i data-lucide="lightbulb"></i></div><span>Keep</span></div>

                    <div class="card c-blue" onclick="openApp('https://docs.google.com/document/u/0/')"><div class="icon-sq"><i data-lucide="file-text"></i></div><span>Docs</span></div>
                    <div class="card c-green" onclick="openApp('https://docs.google.com/spreadsheets/u/0/')"><div class="icon-sq"><i data-lucide="table"></i></div><span>Sheets</span></div>
                    <div class="card c-yellow" onclick="openApp('https://docs.google.com/presentation/u/0/')"><div class="icon-sq"><i data-lucide="presentation"></i></div><span>Slides</span></div>
                    <div class="card c-orange" onclick="openApp('https://slack.com/')"><div class="icon-sq"><i data-lucide="message-circle"></i></div><span>Slack</span></div>

                    <div class="card c-purple" onclick="openApp('https://chat.openai.com/')"><div class="icon-sq"><i data-lucide="bot"></i></div><span>ChatGPT</span></div>
                    <div class="card c-blue" onclick="openApp('https://claude.ai/')"><div class="icon-sq"><i data-lucide="sparkles"></i></div><span>Claude</span></div>
                    <div class="card c-teal" onclick="openApp('http://168.231.78.113:3000')"><div class="icon-sq"><i data-lucide="server"></i></div><span>VPS</span></div>
                    <div class="card c-green" onclick="openApp('http://168.231.78.113:11434')"><div class="icon-sq"><i data-lucide="terminal"></i></div><span>Ollama</span></div>
                </div>
            </section>

            <section id="view-chat" class="view">
                <header class="header">
                    <h1>Assistant</h1>
                </header>
                <div id="chatContainer" style="flex:1; display:flex; flex-direction:column; max-width:600px; margin:0 auto; width:100%;">
                    <iframe src="https://orbit-voice-app.vercel.app" style="flex:1; border:none; border-radius:16px; background:var(--bg-card);"></iframe>
                </div>
            </section>

            <div class="dock-container">
                <nav class="dock">
                    <button class="dock-btn mic"><i data-lucide="mic"></i></button>
                    <button class="dock-btn"><i data-lucide="video-off"></i></button>
                    <div class="dock-sep"></div>
                    <button id="dock-dash" class="dock-btn active" onclick="navTo('dash')"><i data-lucide="layout-grid"></i></button>
                    <button id="dock-chat" class="dock-btn" onclick="navTo('chat')"><i data-lucide="message-square"></i></button>
                    <div class="dock-sep"></div>
                    <button class="dock-btn"><i data-lucide="volume-2"></i></button>
                    <button class="dock-btn play"><i data-lucide="play"></i></button>
                </nav>
            </div>
        </main>
    </div>

    <div id="appFrame" class="app-frame-container">
        <div class="app-frame-header">
            <h3 id="appTitle">App</h3>
            <button class="app-frame-close" onclick="closeApp()"><i data-lucide="x"></i></button>
        </div>
        <iframe id="appIframe" class="app-frame"></iframe>
    </div>

    <script>
        lucide.createIcons();

        function navTo(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('dock-' + view).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.nav-item')[view === 'dash' ? 0 : 1].classList.add('active');
        }

        function openApp(url, title) {
            const frame = document.getElementById('appFrame');
            const iframe = document.getElementById('appIframe');
            const titleEl = document.getElementById('appTitle');
            
            if (title) titleEl.textContent = title;
            else {
                const hostname = new URL(url).hostname;
                titleEl.textContent = hostname.replace('www.', '').split('.')[0];
            }
            
            iframe.src = url;
            frame.classList.add('active');
        }

        function closeApp() {
            const frame = document.getElementById('appFrame');
            const iframe = document.getElementById('appIframe');
            iframe.src = '';
            frame.classList.remove('active');
        }
    </script>
</body>
</html>

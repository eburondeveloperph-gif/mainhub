version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: always

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=t0p-s3cr3t-passw0rd
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - ollama
    restart: always

  api-gateway:
    build:
      context: ./api-gateway
    container_name: eburon-gateway
    ports:
      - "5050:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: always

  tool-broker:
    build:
      context: ./tooling/tool-broker
    container_name: tool-broker
    ports:
      - "5040:5040"
    environment:
      - PORT=5040
      - TOOL_BROKER_API_KEY=${TOOL_BROKER_API_KEY:-eburon-api-key-2024}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - VPS_HOST=168.231.78.113
      - VPS_PASSWORD=Master120221@
    depends_on:
      - ollama
    restart: always

volumes:
  ollama-data:
  open-webui-data:
